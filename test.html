<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEST — Flow Combat Mode</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #2a3044;
      --surface: #343a50;
      --text: #dce0ea;
      --text-dim: #8890aa;
      --accent-blue: #6ea4d4;
      --accent-green: #7ec4a3;
      --accent-gold: #d4a76e;
      --accent-red: #d47070;
      --hud-bg: rgba(40,46,66,0.88);
    }
    body.theme-bw {
      --bg: #f5f5f5;
      --surface: #e8e8e8;
      --text: #1a1a1a;
      --text-dim: #999;
      --accent-blue: #4a90c4;
      --accent-green: #3a8a5a;
      --accent-gold: #b08030;
      --accent-red: #c04040;
      --hud-bg: rgba(240,240,240,0.92);
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 32px 24px;
    }

    #fcm-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    #fcm-container {
      position: relative;
      width: 100%;
      height: 680px;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 40px rgba(0,0,0,0.2);
    }

    .hidden { display: none !important; }

    /* HUD */
    #hud {
      position: sticky; top: 0; left: 0; right: 0;
      height: 80px; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      background: var(--hud-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      user-select: none;
      transition: background 0.3s;
    }
    #hud-left, #hud-center, #hud-right {
      display: flex; align-items: center; gap: 16px;
    }
    .hud-label { font-size: 14px; letter-spacing: 2px; opacity: 0.5; }
    #combo-value {
      font-size: 42px; font-weight: 800;
      color: var(--accent-blue);
      min-width: 56px; text-align: center;
      transition: color 0.3s;
    }
    #combo-bar-wrap {
      width: 160px; height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px; overflow: hidden;
    }
    #combo-bar {
      width: 0%; height: 100%;
      background: var(--accent-blue);
      border-radius: 4px;
      transition: width 0.15s, background 0.3s;
    }
    #score-value   { font-size: 42px; font-weight: 800; color: var(--accent-gold); }
    #accuracy-value { font-size: 28px; font-weight: 700; color: var(--accent-green); }
    #hud-right button {
      padding: 8px 18px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 15px; letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #hud-right button:hover { background: rgba(255,255,255,0.12); }
    #hud-right button.active {
      background: rgba(255,255,255,0.18);
      border-color: var(--accent-blue);
    }

    /* Typing Area */
    #typing-area {
      position: relative;
      width: 100%;
      height: calc(680px - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 6%;
    }
    #hidden-input {
      position: absolute;
      top: -9999px; left: -9999px;
      width: 1px; height: 1px;
      opacity: 0;
    }

    /* TEST area — flat (no 3D roller) */
    #test-area {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    #sentence-counter {
      font-size: 16px;
      letter-spacing: 2px;
      opacity: 0.4;
      margin-bottom: 16px;
    }

    #target-display {
      font-size: 42px;
      letter-spacing: 4px;
      margin-bottom: 20px;
      user-select: none;
      line-height: 1.8;
      text-align: center;
    }

    #target-display .target-done   { color: rgba(126,196,163,0.3); }
    #target-display .target-error  { color: rgba(212,112,112,0.4); }
    #target-display .target-active {
      color: var(--text);
      font-weight: 700;
      text-decoration: underline;
      text-decoration-color: var(--accent-blue);
      text-underline-offset: 4px;
    }
    #target-display .target-pending { color: var(--text-dim); }

    #test-input-display {
      font-size: 42px;
      letter-spacing: 4px;
      line-height: 1.8;
      min-height: 50px;
      text-align: center;
    }

    #test-nav {
      display: flex;
      gap: 16px;
      margin-top: 32px;
    }
    #test-nav button {
      padding: 10px 24px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      color: var(--text-dim);
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #test-nav button:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* Char styles */
    .char { display: inline; }
    .char.correct { color: var(--accent-green); }
    .char.wrong   { color: var(--accent-red); text-decoration: underline wavy var(--accent-red); }
    .char.normal  { color: var(--text); }

    .composing {
      color: var(--accent-blue);
      opacity: 0.6;
      border-bottom: 2px dashed var(--accent-blue);
    }
    .cursor {
      display: inline-block;
      width: 3px; height: 1.1em;
      background: var(--accent-blue);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Complete msg */
    #complete-msg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 64px; font-weight: 900;
      letter-spacing: 10px;
      color: var(--accent-gold);
      text-shadow: 0 0 40px rgba(212,167,110,0.6);
      opacity: 0;
      pointer-events: none;
      z-index: 200;
      transition: opacity 0.3s;
    }
    #complete-msg.show { opacity: 1; }

    /* Canvas */
    #vfx {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      pointer-events: none;
    }

    /* Animations */
    @keyframes scale-bounce {
      0%   { transform: scale(0.3); opacity: 0.2; }
      50%  { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .char-spawn { display: inline-block; animation: scale-bounce 0.08s ease-out; }

    @keyframes screen-shake {
      0%   { transform: translate(0,0); }
      20%  { transform: translate(-3px,2px); }
      40%  { transform: translate(3px,-2px); }
      60%  { transform: translate(-2px,3px); }
      80%  { transform: translate(2px,-1px); }
      100% { transform: translate(0,0); }
    }
    .screen-shake { animation: screen-shake 0.1s ease-out; }

    @keyframes error-shake {
      0%   { transform: translate(0,0); }
      15%  { transform: translate(-8px,0); }
      30%  { transform: translate(8px,0); }
      45%  { transform: translate(-6px,0); }
      60%  { transform: translate(6px,0); }
      75%  { transform: translate(-3px,0); }
      100% { transform: translate(0,0); }
    }
    .error-shake { animation: error-shake 0.3s ease-out; }

    /* Combo tiers */
    .combo-green #combo-value { color: var(--accent-green); }
    .combo-green #combo-bar   { background: var(--accent-green); }
    .combo-gold  #combo-value { color: var(--accent-gold); }
    .combo-gold  #combo-bar   { background: var(--accent-gold); }

    /* BW overrides */
    body.theme-bw #hud { border-bottom-color: rgba(0,0,0,0.1); }
    body.theme-bw #hud-right button { border-color: rgba(0,0,0,0.15); background: rgba(0,0,0,0.04); }
    body.theme-bw #hud-right button:hover { background: rgba(0,0,0,0.08); }
    body.theme-bw #hud-right button.active { background: rgba(0,0,0,0.12); border-color: var(--accent-blue); }
    body.theme-bw #combo-bar-wrap { background: rgba(0,0,0,0.08); }
    body.theme-bw #target-display .target-done  { color: rgba(58,138,90,0.35); }
    body.theme-bw #target-display .target-error { color: rgba(192,64,64,0.4); }
    body.theme-bw #test-nav button { border-color: rgba(0,0,0,0.12); background: rgba(0,0,0,0.04); }
    body.theme-bw .cursor { background: var(--text); }
  </style>
</head>
<body>

  <div id="fcm-wrapper">
    <div id="fcm-container">

      <!-- HUD -->
      <div id="hud">
        <div id="hud-left">
          <div class="hud-label">COMBO</div>
          <div id="combo-value">0</div>
          <div id="combo-bar-wrap"><div id="combo-bar"></div></div>
        </div>
        <div id="hud-center">
          <div class="hud-label">SCORE</div>
          <div id="score-value">0</div>
        </div>
        <div id="hud-right">
          <div id="accuracy-wrap">
            <div class="hud-label">正確率</div>
            <div id="accuracy-value">100%</div>
          </div>
          <button id="btn-copy" title="複製文字">COPY</button>
          <button id="btn-theme" title="切換主題">BW</button>
          <button id="btn-mute" title="靜音切換">🔊</button>
        </div>
      </div>

      <!-- Typing Area -->
      <div id="typing-area">
        <div id="test-area">
          <div id="sentence-counter"></div>
          <div id="target-display"></div>
          <div id="test-input-display"></div>
          <div id="test-nav">
            <button id="btn-prev">&#9664; PREV</button>
            <button id="btn-next">NEXT &#9654;</button>
          </div>
        </div>
        <textarea id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
      </div>

      <div id="complete-msg">PERFECT!</div>
      <canvas id="vfx"></canvas>

    </div>
  </div>

  <script>
    const SENTENCES = [
      '用自然輸入法輸入很自然。考試都考一百分！',
      '愈來愈多老師要求學生用簡報軟體做口頭報告',
      '聽眾不會在乎你有時看看講稿或小抄',
      '投影片上只留下最基本最重要的資訊',
      '沒有色彩變化的投影片真的很無趣',
      '運用動畫音效一定要謹慎寧缺毋濫',
      '決定簡報成功與否不是做了多少張投影片',
      '字體不花俏不多變聽眾才能一目了然',
      '簡報設計簡潔化就可避免窘況發生',
      '把每個條列重點分開各做一張投影片',
    ];

    // ── DOM ──
    const hiddenInput      = document.getElementById('hidden-input');
    const testInputDisplay = document.getElementById('test-input-display');
    const targetDisplay    = document.getElementById('target-display');
    const comboValueEl     = document.getElementById('combo-value');
    const comboBar         = document.getElementById('combo-bar');
    const scoreValueEl     = document.getElementById('score-value');
    const accuracyEl       = document.getElementById('accuracy-value');
    const hudEl            = document.getElementById('hud');
    const btnCopy          = document.getElementById('btn-copy');
    const btnTheme         = document.getElementById('btn-theme');
    const btnMute          = document.getElementById('btn-mute');
    const btnPrev          = document.getElementById('btn-prev');
    const btnNext          = document.getElementById('btn-next');
    const typingArea       = document.getElementById('typing-area');
    const completeMsg      = document.getElementById('complete-msg');
    const sentenceCounter  = document.getElementById('sentence-counter');
    const canvas           = document.getElementById('vfx');
    const ctx              = canvas.getContext('2d');

    // ── State ──
    let combo = 0, score = 0, muted = false;
    let totalCorrect = 0, totalTyped = 0;
    let sentenceIdx = 0, currentTarget = '';
    let prevText = '', composingText = '', isComposing = false;
    let processTimer = null, lastCommittedValue = '';
    let themeBW = false;

    const COMBO_TIERS = [
      { min: 0,  color: '#6ea4d4', bwColor: '#4a90c4', mult: 1 },
      { min: 10, color: '#7ec4a3', bwColor: '#3a8a5a', mult: 2 },
      { min: 30, color: '#d4a76e', bwColor: '#b08030', mult: 4 },
    ];
    const BASE_POINT = 10;
    const MAX_PARTICLES = 200;
    const PUNCT = new Set('。，！？；：、.!?,;:');

    // ── Audio ──
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTone(freq, dur, type = 'sine', vol = 0.08) {
      if (muted || !audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, audioCtx.currentTime);
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur / 1000);
      o.connect(g).connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur / 1000);
    }
    function sfxCorrect()  { playTone(520, 30); }
    function sfxWrong()    { playTone(200, 60, 'sawtooth', 0.06); }
    function sfxError()    { playTone(150, 100, 'sawtooth', 0.06); }
    function sfxUpgrade()  { playTone(880, 150, 'sine', 0.1); }
    function sfxComplete() { playTone(660, 200); setTimeout(() => playTone(880, 300), 150); }

    // ── Canvas ──
    const fcmContainer = document.getElementById('fcm-container');
    function resizeCanvas() {
      const rect = fcmContainer.getBoundingClientRect();
      canvas.width  = rect.width  * devicePixelRatio;
      canvas.height = rect.height * devicePixelRatio;
      canvas.style.width  = rect.width  + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ── Particles ──
    const particles = [];
    function getParticle() {
      for (let i = 0; i < particles.length; i++) if (!particles[i].alive) return particles[i];
      if (particles.length < MAX_PARTICLES) { const p = { alive: false }; particles.push(p); return p; }
      return null;
    }
    function spawnParticles(x, y, count, color, spread = 80) {
      const cr = fcmContainer.getBoundingClientRect();
      const cx = x - cr.left, cy = y - cr.top;
      for (let i = 0; i < count; i++) {
        const p = getParticle(); if (!p) break;
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * spread + 20;
        Object.assign(p, { alive: true, x: cx, y: cy, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 30,
          life: 1, decay: 0.02 + Math.random()*0.03, size: 2 + Math.random()*3, color });
      }
    }
    let lastFrame = 0;
    function renderLoop(ts) {
      const dt = Math.min((ts - lastFrame) / 1000, 0.05); lastFrame = ts;
      ctx.clearRect(0, 0, canvas.width/devicePixelRatio, canvas.height/devicePixelRatio);
      for (const p of particles) {
        if (!p.alive) continue;
        p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 120*dt; p.life -= p.decay;
        if (p.life <= 0) { p.alive = false; continue; }
        ctx.globalAlpha = Math.min(p.life, 0.45);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);

    // ── Combo / Score ──
    function getTier() {
      for (let i = COMBO_TIERS.length - 1; i >= 0; i--)
        if (combo >= COMBO_TIERS[i].min) return COMBO_TIERS[i];
      return COMBO_TIERS[0];
    }
    function tierColor(tier) { return themeBW ? tier.bwColor : tier.color; }
    function errColor()      { return themeBW ? '#c04040' : '#d47070'; }

    function updateHUD() {
      comboValueEl.textContent = combo;
      scoreValueEl.textContent = score;
      comboBar.style.width = Math.min(combo/50, 1)*100 + '%';
      hudEl.classList.remove('combo-green', 'combo-gold');
      if (combo >= 30) hudEl.classList.add('combo-gold');
      else if (combo >= 10) hudEl.classList.add('combo-green');
      const acc = totalTyped === 0 ? 100 : Math.round((totalCorrect/totalTyped)*100);
      accuracyEl.textContent = acc + '%';
    }
    function addCombo() {
      const prev = getTier(); combo++;
      const next = getTier();
      score += BASE_POINT * next.mult;
      if (next !== prev) sfxUpgrade();
      updateHUD();
    }
    function breakCombo() { combo = 0; updateHUD(); }

    // ── Helpers ──
    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function getCharPosAt(container, idx) {
      const spans = container.querySelectorAll('.char');
      const span = spans[idx] || spans[spans.length - 1];
      if (span) { const r = span.getBoundingClientRect(); return { x: r.left + r.width/2, y: r.top + r.height/2 }; }
      const r = container.getBoundingClientRect();
      return { x: r.left + 20, y: r.top + r.height/2 };
    }

    // ── Shake ──
    function shakeEl(el, cls) {
      el.classList.remove(cls); void el.offsetWidth;
      el.classList.add(cls);
      el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
    }
    function shakeScreen() { shakeEl(typingArea, 'screen-shake'); }
    function errorShake()  { shakeEl(typingArea, 'error-shake'); }

    // ── Render TEST ──
    function renderTest(committed, composing) {
      const targetChars = [...currentTarget];
      const typedChars  = [...committed];
      const typedLen = typedChars.length;

      let inputHtml = '';
      for (let i = 0; i < typedLen; i++) {
        const ok = targetChars[i] !== undefined && typedChars[i] === targetChars[i];
        const cls = ok ? 'correct' : 'wrong';
        const spawn = (i === typedLen - 1 && !composing) ? ' char-spawn' : '';
        inputHtml += '<span class="char ' + cls + spawn + '">' + esc(typedChars[i]) + '</span>';
      }
      if (composing) inputHtml += '<span class="composing">' + esc(composing) + '</span>';
      if (typedLen < targetChars.length) inputHtml += '<span class="cursor"></span>';
      testInputDisplay.innerHTML = inputHtml;

      let targetHtml = '';
      for (let i = 0; i < targetChars.length; i++) {
        let cls = 'target-pending';
        if (i < typedLen) {
          cls = (typedChars[i] === targetChars[i]) ? 'target-done' : 'target-error';
        } else if (i === typedLen) {
          cls = 'target-active';
        }
        targetHtml += '<span class="' + cls + '">' + esc(targetChars[i]) + '</span>';
      }
      targetDisplay.innerHTML = targetHtml;
    }

    function handleTestChange(committed, wasDelete) {
      ensureAudio();
      const targetChars = [...currentTarget];
      const typedChars  = [...committed];

      if (wasDelete) {
        breakCombo(); errorShake(); sfxError();
        renderTest(committed, '');
        requestAnimationFrame(() => {
          const pos = typedChars.length > 0
            ? getCharPosAt(testInputDisplay, typedChars.length - 1)
            : { x: testInputDisplay.getBoundingClientRect().left + 20, y: testInputDisplay.getBoundingClientRect().top + 20 };
          spawnParticles(pos.x, pos.y, 12, errColor(), 100);
        });
        return;
      }

      const prevChars = [...prevText];
      const newCount  = typedChars.length - prevChars.length;
      for (let i = 0; i < newCount; i++) {
        const idx = prevChars.length + i;
        totalTyped++;
        if (targetChars[idx] !== undefined && typedChars[idx] === targetChars[idx]) {
          totalCorrect++; addCombo(); sfxCorrect();
        } else {
          breakCombo(); sfxWrong();
        }
      }

      renderTest(committed, '');
      requestAnimationFrame(() => {
        const lastIdx = typedChars.length - 1;
        if (lastIdx < 0) return;
        const pos = getCharPosAt(testInputDisplay, lastIdx);
        const ok  = targetChars[lastIdx] !== undefined && typedChars[lastIdx] === targetChars[lastIdx];
        if (ok) {
          const tier = getTier();
          spawnParticles(pos.x, pos.y, 5 + Math.min(combo, 30), tierColor(tier));
          if (PUNCT.has(typedChars[lastIdx])) {
            shakeScreen();
            spawnParticles(pos.x, pos.y, 15, tierColor(tier), 120);
          }
        } else {
          spawnParticles(pos.x, pos.y, 8, errColor(), 60);
          errorShake();
        }
      });

      if (typedChars.length === targetChars.length) {
        const allCorrect = typedChars.every((c, i) => c === targetChars[i]);
        if (allCorrect) onSentenceComplete();
      }
    }

    function onSentenceComplete() {
      sfxComplete();
      completeMsg.classList.add('show');
      setTimeout(() => completeMsg.classList.remove('show'), 1500);
      const r = testInputDisplay.getBoundingClientRect();
      spawnParticles(r.left + r.width/2, r.top + r.height/2, 50, tierColor(getTier()), 150);
      setTimeout(() => {
        if (sentenceIdx < SENTENCES.length - 1) loadSentence(sentenceIdx + 1);
      }, 1200);
    }

    function updateNav() {
      sentenceCounter.textContent = (sentenceIdx + 1) + ' / ' + SENTENCES.length;
      btnPrev.style.visibility = sentenceIdx > 0 ? 'visible' : 'hidden';
      btnNext.style.visibility = sentenceIdx < SENTENCES.length - 1 ? 'visible' : 'hidden';
    }

    function loadSentence(idx) {
      sentenceIdx = idx;
      currentTarget = SENTENCES[idx];
      hiddenInput.value = '';
      prevText = '';
      composingText = '';
      lastCommittedValue = '';
      updateNav();
      renderTest('', '');
      hiddenInput.focus();
    }

    btnPrev.addEventListener('click', (e) => {
      e.stopPropagation();
      if (sentenceIdx > 0) loadSentence(sentenceIdx - 1);
    });
    btnNext.addEventListener('click', (e) => {
      e.stopPropagation();
      if (sentenceIdx < SENTENCES.length - 1) loadSentence(sentenceIdx + 1);
    });

    // ── IME ──
    hiddenInput.addEventListener('compositionstart', () => {
      isComposing = true; composingText = '';
      lastCommittedValue = hiddenInput.value;
    });
    hiddenInput.addEventListener('compositionupdate', (e) => {
      composingText = e.data || '';
      renderTest(lastCommittedValue, composingText);
    });
    hiddenInput.addEventListener('compositionend', () => {
      isComposing = false; composingText = '';
      clearTimeout(processTimer);
      processTimer = setTimeout(processInput, 30);
    });
    hiddenInput.addEventListener('input', (e) => {
      if (isComposing || e.isComposing) return;
      clearTimeout(processTimer);
      processTimer = setTimeout(processInput, 30);
    });

    // Prevent exceeding target length
    hiddenInput.addEventListener('keydown', (e) => {
      if (isComposing || e.key === 'Process') return;
      const targetLen  = [...currentTarget].length;
      const currentLen = [...hiddenInput.value].length;
      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && currentLen >= targetLen) {
        e.preventDefault();
      }
    });

    function processInput() {
      const committed = hiddenInput.value;
      if (committed === prevText) { renderTest(committed, ''); return; }
      const wasDelete = [...committed].length < [...prevText].length;
      handleTestChange(committed, wasDelete);
      prevText = committed;
      lastCommittedValue = committed;
    }

    // ── Focus ──
    document.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
      hiddenInput.focus();
    });

    // ── Buttons ──
    btnCopy.addEventListener('click', (e) => {
      e.stopPropagation();
      const text = hiddenInput.value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        btnCopy.textContent = 'OK!';
        setTimeout(() => { btnCopy.textContent = 'COPY'; }, 1000);
      });
    });

    btnTheme.addEventListener('click', (e) => {
      e.stopPropagation();
      themeBW = !themeBW;
      document.body.classList.toggle('theme-bw', themeBW);
      btnTheme.classList.toggle('active', themeBW);
      hiddenInput.focus();
    });

    btnMute.addEventListener('click', (e) => {
      e.stopPropagation();
      muted = !muted;
      btnMute.textContent = muted ? '🔇' : '🔊';
      if (muted && audioCtx) audioCtx.suspend();
      else if (!muted && audioCtx) audioCtx.resume();
    });

    // ── Init ──
    loadSentence(0);
    updateHUD();
    hiddenInput.focus();
  </script>
</body>
</html>
