<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自然輸入法 — 打字速測體驗</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════
       自然輸入法 × Flow Combat Mode — TEST 模組
       全內嵌單檔，適用 Strikingly iframe 嵌入
       ═══════════════════════════════════════════ */

    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* 自然輸入法品牌色系 */
      --brand-primary: #0a7ed6;
      --brand-primary-light: #50aef7;
      --brand-primary-dark: #064575;
      --brand-dark-bg: #010e18;
      --brand-light-blue: #b1dbfb;
      --brand-near-white: #e0f2fa;

      /* 深色主題（預設） */
      --bg: #0d1a2a;
      --surface: #152238;
      --text: #e0f2fa;
      --text-dim: #6a8fad;
      --accent-blue: #50aef7;
      --accent-green: #7ec4a3;
      --accent-gold: #f0b860;
      --accent-red: #f06060;
      --hud-bg: rgba(13,26,42,0.92);
    }

    /* 白底品牌主題 */
    body.theme-bw {
      --bg: #f5f7fa;
      --surface: #e8eaec;
      --text: #1D2023;
      --text-dim: #6a7a8a;
      --accent-blue: #0a7ed6;
      --accent-green: #3a8a5a;
      --accent-gold: #c08a30;
      --accent-red: #d04040;
      --hud-bg: rgba(245,247,250,0.95);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      overflow: hidden;
      transition: background 0.4s, color 0.4s;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hidden { display: none !important; }

    /* ── 手機端偵測提示 ── */
    #mobile-notice {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px;
      text-align: center;
    }

    #mobile-notice .notice-icon {
      font-size: 64px;
      opacity: 0.6;
    }

    #mobile-notice h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 2px;
    }

    #mobile-notice p {
      font-size: 15px;
      color: var(--text-dim);
      line-height: 1.8;
      max-width: 360px;
    }

    #mobile-notice .brand-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      opacity: 0.5;
    }

    #mobile-notice .brand-badge img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    #mobile-notice .brand-badge span {
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    /* ── 主容器 ── */
    #fcm-wrapper {
      width: 100%;
      max-width: 1100px;
      height: 100%;
      max-height: 720px;
      padding: 0;
    }

    #fcm-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--bg);
      border-radius: 0;
      overflow: hidden;
    }

    /* ── HUD ── */
    #hud {
      position: relative;
      top: 0; left: 0; right: 0;
      height: 72px; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      background: var(--hud-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(80,174,247,0.08);
      user-select: none;
      transition: background 0.4s;
    }

    #hud-left, #hud-center, #hud-right {
      display: flex; align-items: center; gap: 14px;
    }

    /* 品牌標誌 */
    #brand-mark {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-right: 16px;
    }

    #brand-mark img {
      width: 32px; height: 32px;
      border-radius: 8px;
      opacity: 0.9;
    }

    #brand-mark .brand-text {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #brand-mark .brand-sep {
      width: 1px;
      height: 24px;
      background: rgba(80,174,247,0.15);
      margin: 0 4px;
    }

    .hud-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.4;
      font-weight: 500;
    }

    #combo-value {
      font-size: 36px; font-weight: 900;
      color: var(--accent-blue);
      min-width: 48px; text-align: center;
      transition: color 0.3s;
      font-variant-numeric: tabular-nums;
    }

    #combo-bar-wrap {
      width: 120px; height: 6px;
      background: rgba(80,174,247,0.1);
      border-radius: 3px; overflow: hidden;
    }

    #combo-bar {
      width: 0%; height: 100%;
      background: var(--accent-blue);
      border-radius: 3px;
      transition: width 0.15s ease-out, background 0.3s;
    }

    #score-value {
      font-size: 36px; font-weight: 900;
      color: var(--accent-gold);
      font-variant-numeric: tabular-nums;
    }

    #accuracy-value {
      font-size: 26px; font-weight: 700;
      color: var(--accent-green);
      font-variant-numeric: tabular-nums;
    }

    #hud-right button {
      padding: 7px 16px;
      border: 1px solid rgba(80,174,247,0.15);
      border-radius: 100px;
      background: rgba(80,174,247,0.06);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s;
    }

    #hud-right button:hover {
      background: rgba(80,174,247,0.15);
      color: var(--text);
      border-color: rgba(80,174,247,0.3);
    }

    #hud-right button.active {
      background: rgba(10,126,214,0.2);
      border-color: var(--brand-primary);
      color: var(--accent-blue);
    }

    /* ── Typing Area ── */
    #typing-area {
      position: relative;
      width: 100%;
      height: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 6%;
    }

    #hidden-input {
      position: absolute;
      top: 50%; left: 50%;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }

    /* ── TEST Area ── */
    #test-area {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #sentence-counter {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 3px;
      color: var(--text-dim);
      opacity: 0.6;
      margin-bottom: 8px;
    }

    #target-display {
      font-size: 34px;
      font-weight: 500;
      letter-spacing: 4px;
      margin-bottom: 24px;
      user-select: none;
      line-height: 1.8;
      text-align: center;
      word-break: break-all;
    }

    #target-display .target-done   { color: rgba(126,196,163,0.35); }
    #target-display .target-error  { color: rgba(240,96,96,0.4); }
    #target-display .target-active {
      color: var(--text);
      font-weight: 700;
      text-decoration: underline;
      text-decoration-color: var(--accent-blue);
      text-underline-offset: 6px;
      text-decoration-thickness: 3px;
    }
    #target-display .target-pending { color: var(--text-dim); opacity: 0.6; }

    #test-input-display {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 4px;
      line-height: 1.8;
      min-height: 60px;
      text-align: center;
      word-break: break-all;
      width: 100%;
    }

    #test-nav {
      display: flex;
      gap: 16px;
      margin-top: 36px;
    }
    #test-nav button {
      padding: 10px 24px;
      border: 1px solid rgba(80,174,247,0.15);
      border-radius: 100px;
      background: rgba(80,174,247,0.06);
      color: var(--text-dim);
      font-size: 15px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s;
      font-weight: 500;
    }
    #test-nav button:hover {
      background: rgba(80,174,247,0.15);
      color: var(--text);
      border-color: rgba(80,174,247,0.3);
    }

    /* ── 字元與游標樣式 ── */
    .char { display: inline; }
    .char.correct { color: var(--accent-green); }
    .char.wrong   { color: var(--accent-red); text-decoration: underline wavy var(--accent-red); text-underline-offset: 4px; }
    .char.normal  { color: var(--text); }

    .composing {
      color: var(--accent-blue);
      opacity: 0.7;
      border-bottom: 2px dashed var(--accent-blue);
    }

    .cursor {
      display: inline-block;
      width: 3px; height: 1.1em;
      background: var(--brand-primary);
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
      margin-left: 1px;
      border-radius: 1px;
      box-shadow: 0 0 8px rgba(10,126,214,0.4);
    }

    body.theme-bw .cursor {
      background: var(--text);
      box-shadow: none;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── 完成訊息 ── */
    #complete-msg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 56px; font-weight: 900;
      letter-spacing: 8px;
      color: var(--accent-gold);
      text-shadow: 0 0 40px rgba(240,184,96,0.6);
      opacity: 0;
      pointer-events: none;
      z-index: 200;
      transition: opacity 0.3s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    #complete-msg.show { opacity: 1; }

    /* ── Canvas ── */
    #vfx {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      pointer-events: none;
    }

    /* ── 動畫 ── */
    @keyframes scale-bounce {
      0%   { transform: scale(0.3); opacity: 0.2; }
      50%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    .char-spawn { display: inline-block; animation: scale-bounce 0.08s ease-out; }

    @keyframes screen-shake {
      0%   { transform: translate(0,0); }
      20%  { transform: translate(-3px,2px); }
      40%  { transform: translate(3px,-2px); }
      60%  { transform: translate(-2px,3px); }
      80%  { transform: translate(2px,-1px); }
      100% { transform: translate(0,0); }
    }
    .screen-shake { animation: screen-shake 0.1s ease-out; }

    @keyframes error-shake {
      0%   { transform: translate(0,0); }
      15%  { transform: translate(-8px,0); }
      30%  { transform: translate(8px,0); }
      45%  { transform: translate(-6px,0); }
      60%  { transform: translate(6px,0); }
      75%  { transform: translate(-3px,0); }
      100% { transform: translate(0,0); }
    }
    .error-shake { animation: error-shake 0.3s ease-out; }

    /* ── Combo 顏色階段 ── */
    .combo-green #combo-value { color: var(--accent-green); }
    .combo-green #combo-bar   { background: var(--accent-green); }
    .combo-gold  #combo-value { color: var(--accent-gold); }
    .combo-gold  #combo-bar   { background: var(--accent-gold); }

    /* ── 白底主題覆寫 ── */
    body.theme-bw #hud {
      border-bottom-color: rgba(0,0,0,0.08);
    }

    body.theme-bw #hud-right button {
      border-color: rgba(0,0,0,0.12);
      background: rgba(0,0,0,0.03);
      color: #50555c;
    }

    body.theme-bw #hud-right button:hover {
      background: rgba(0,0,0,0.06);
      color: #1D2023;
    }

    body.theme-bw #hud-right button.active {
      background: rgba(10,126,214,0.1);
      border-color: var(--brand-primary);
      color: var(--brand-primary);
    }

    body.theme-bw #combo-bar-wrap {
      background: rgba(0,0,0,0.06);
    }

    body.theme-bw #brand-mark .brand-sep {
      background: rgba(0,0,0,0.1);
    }

    body.theme-bw #target-display .target-done  { color: rgba(58,138,90,0.35); }
    body.theme-bw #target-display .target-error { color: rgba(192,64,64,0.45); }
    body.theme-bw #test-nav button {
      border-color: rgba(0,0,0,0.12);
      background: rgba(0,0,0,0.03);
      color: #50555c;
    }
    body.theme-bw #test-nav button:hover {
      background: rgba(0,0,0,0.06);
      color: #1D2023;
    }

    /* ── 品牌浮水印 ── */
    #brand-watermark {
      position: absolute;
      bottom: 16px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.2;
      pointer-events: none;
      z-index: 50;
      transition: opacity 0.3s;
    }

    #brand-watermark img {
      width: 20px; height: 20px;
      border-radius: 4px;
    }

    #brand-watermark span {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    /* ── 響應式微調 ── */
    @media (max-width: 768px) {
      #target-display, #test-input-display {
        font-size: 24px;
        letter-spacing: 2px;
      }
      #combo-value, #score-value {
        font-size: 28px;
      }
      #combo-bar-wrap { width: 80px; }
      #hud { padding: 0 16px; }
      #brand-mark .brand-text { display: none; }
      #brand-mark .brand-sep { display: none; }
    }
  </style>
</head>
<body>

  <!-- ═══════ 手機端提示 ═══════ -->
  <div id="mobile-notice">
    <div class="notice-icon">🖥️</div>
    <h2>本功能僅支援個人電腦</h2>
    <p>
      打字速測體驗需要實體鍵盤操作，<br />
      請使用個人電腦瀏覽器開啟此頁面，<br />
      以獲得最佳體驗。
    </p>
    <div class="brand-badge">
      <img src="https://custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_limit,fl_lossy,h_300,w_300,f_auto,q_auto/17369235/998002_985863.png" alt="自然輸入法" />
      <span>自然輸入法</span>
    </div>
  </div>

  <!-- ═══════ 主介面 ═══════ -->
  <div id="fcm-wrapper">
    <div id="fcm-container">

      <!-- HUD -->
      <div id="hud">
        <div id="hud-left">
          <div id="brand-mark">
            <img src="https://custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_limit,fl_lossy,h_300,w_300,f_auto,q_auto/17369235/998002_985863.png" alt="自然輸入法" />
            <div class="brand-sep"></div>
            <span class="brand-text">打字速測體驗</span>
          </div>
          <div>
            <div class="hud-label">COMBO</div>
            <div id="combo-value">0</div>
          </div>
          <div id="combo-bar-wrap"><div id="combo-bar"></div></div>
        </div>
        <div id="hud-center">
          <div class="hud-label">SCORE</div>
          <div id="score-value">0</div>
        </div>
        <div id="hud-right">
          <div id="accuracy-wrap" style="display: flex; flex-direction: column; align-items: flex-end; margin-right: 8px;">
            <div class="hud-label">正確率</div>
            <div id="accuracy-value">100%</div>
          </div>
          <button id="btn-copy" title="複製文字">COPY</button>
          <button id="btn-theme" title="切換主題">BW</button>
          <button id="btn-mute" title="靜音切換">🔊</button>
        </div>
      </div>

      <!-- 打字區 -->
      <div id="typing-area">
        <div id="test-area">
          <div id="sentence-counter"></div>
          <div id="target-display"></div>
          <div id="test-input-display"></div>
          <div id="test-nav">
            <button id="btn-prev">&#9664; 上一題</button>
            <button id="btn-next">下一題 &#9654;</button>
          </div>
        </div>
        <textarea id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
      </div>

      <div id="complete-msg">完美達成！</div>
      <canvas id="vfx"></canvas>

      <!-- 品牌浮水印 -->
      <div id="brand-watermark">
        <img src="https://custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_limit,fl_lossy,h_300,w_300,f_auto,q_auto/17369235/998002_985863.png" alt="" />
        <span>自然輸入法 × Flow Combat Mode</span>
      </div>

    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════
    //  自然輸入法 × Flow Combat Mode — TEST 模組
    //  全內嵌版，適用 Strikingly iframe 嵌入
    // ═══════════════════════════════════════════════

    // ── 手機端偵測 ──
    (function detectMobile() {
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
        || (window.innerWidth <= 768 && 'ontouchstart' in window);
      if (isMobile) {
        document.getElementById('mobile-notice').style.display = 'flex';
        document.getElementById('fcm-wrapper').style.display = 'none';
      }
    })();

    const SENTENCES = [
      '用自然輸入法輸入很自然。考試都考一百分！',
      '愈來愈多老師要求學生用簡報軟體做口頭報告',
      '聽眾不會在乎你有時看看講稿或小抄',
      '投影片上只留下最基本最重要的資訊',
      '沒有色彩變化的投影片真的很無趣',
      '運用動畫音效一定要謹慎寧缺毋濫',
      '決定簡報成功與否不是做了多少張投影片',
      '字體不花俏不多變聽眾才能一目了然',
      '簡報設計簡潔化就可避免窘況發生',
      '把每個條列重點分開各做一張投影片',
    ];

    // ── DOM ──
    const hiddenInput      = document.getElementById('hidden-input');
    const testInputDisplay = document.getElementById('test-input-display');
    const targetDisplay    = document.getElementById('target-display');
    const comboValueEl     = document.getElementById('combo-value');
    const comboBar         = document.getElementById('combo-bar');
    const scoreValueEl     = document.getElementById('score-value');
    const accuracyEl       = document.getElementById('accuracy-value');
    const hudEl            = document.getElementById('hud');
    const btnCopy          = document.getElementById('btn-copy');
    const btnTheme         = document.getElementById('btn-theme');
    const btnMute          = document.getElementById('btn-mute');
    const btnPrev          = document.getElementById('btn-prev');
    const btnNext          = document.getElementById('btn-next');
    const typingArea       = document.getElementById('typing-area');
    const completeMsg      = document.getElementById('complete-msg');
    const sentenceCounter  = document.getElementById('sentence-counter');
    const canvas           = document.getElementById('vfx');
    const ctx              = canvas.getContext('2d');

    // ── State ──
    let combo = 0, score = 0, muted = false;
    let totalCorrect = 0, totalTyped = 0;
    let sentenceIdx = 0, currentTarget = '';
    let prevText = '', composingText = '', isComposing = false;
    let processTimer = null, lastCommittedValue = '';
    let themeBW = false;
    let isDeleteKeyActive = false; // 🌟 實體刪除鍵狀態防禦

    const COMBO_TIERS = [
      { min: 0,  color: '#50aef7', bwColor: '#0a7ed6', mult: 1 },   // 品牌藍
      { min: 10, color: '#7ec4a3', bwColor: '#3a8a5a', mult: 2 },   // 綠
      { min: 30, color: '#f0b860', bwColor: '#c08a30', mult: 4 },   // 金
    ];
    const BASE_POINT = 10;
    const MAX_PARTICLES = 200;
    const PUNCT = new Set('。，！？；：、.!?,;:');

    // ── Audio ──
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTone(freq, dur, type = 'sine', vol = 0.08) {
      if (muted || !audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, audioCtx.currentTime);
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur / 1000);
      o.connect(g).connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur / 1000);
    }
    function sfxCorrect()  { playTone(520, 30); }
    function sfxWrong()    { playTone(200, 60, 'sawtooth', 0.06); }
    function sfxError()    { playTone(150, 100, 'sawtooth', 0.06); }
    function sfxUpgrade()  { playTone(880, 150, 'sine', 0.1); }
    function sfxComplete() { playTone(660, 200); setTimeout(() => playTone(880, 300), 150); }

    // ── Canvas ──
    const fcmContainer = document.getElementById('fcm-container');
    function resizeCanvas() {
      const rect = fcmContainer.getBoundingClientRect();
      canvas.width  = rect.width  * devicePixelRatio;
      canvas.height = rect.height * devicePixelRatio;
      canvas.style.width  = rect.width  + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ── Particles ──
    const particles = [];
    function getParticle() {
      for (let i = 0; i < particles.length; i++) if (!particles[i].alive) return particles[i];
      if (particles.length < MAX_PARTICLES) { const p = { alive: false }; particles.push(p); return p; }
      return null;
    }
    function spawnParticles(x, y, count, color, spread = 80) {
      const cr = fcmContainer.getBoundingClientRect();
      const cx = x - cr.left, cy = y - cr.top;
      for (let i = 0; i < count; i++) {
        const p = getParticle(); if (!p) break;
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * spread + 20;
        Object.assign(p, { alive: true, x: cx, y: cy, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 30,
          life: 1, decay: 0.02 + Math.random()*0.03, size: 2 + Math.random()*3, color });
      }
    }
    let lastFrame = 0;
    function renderLoop(ts) {
      const dt = Math.min((ts - lastFrame) / 1000, 0.05); lastFrame = ts;
      ctx.clearRect(0, 0, canvas.width/devicePixelRatio, canvas.height/devicePixelRatio);
      for (const p of particles) {
        if (!p.alive) continue;
        p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 120*dt; p.life -= p.decay;
        if (p.life <= 0) { p.alive = false; continue; }
        ctx.globalAlpha = Math.min(p.life, 0.45);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);

    // ── Combo / Score ──
    function getTier() {
      for (let i = COMBO_TIERS.length - 1; i >= 0; i--)
        if (combo >= COMBO_TIERS[i].min) return COMBO_TIERS[i];
      return COMBO_TIERS[0];
    }
    function tierColor(tier) { return themeBW ? tier.bwColor : tier.color; }
    function errColor()      { return themeBW ? '#d04040' : '#f06060'; }

    function updateHUD() {
      comboValueEl.textContent = combo;
      scoreValueEl.textContent = score;
      comboBar.style.width = Math.min(combo/50, 1)*100 + '%';
      hudEl.classList.remove('combo-green', 'combo-gold');
      if (combo >= 30) hudEl.classList.add('combo-gold');
      else if (combo >= 10) hudEl.classList.add('combo-green');
      const acc = totalTyped === 0 ? 100 : Math.round((totalCorrect/totalTyped)*100);
      accuracyEl.textContent = acc + '%';
    }
    function addCombo() {
      const prev = getTier(); combo++;
      const next = getTier();
      score += BASE_POINT * next.mult;
      if (next !== prev) sfxUpgrade();
      updateHUD();
    }
    function breakCombo() { combo = 0; updateHUD(); }

    // ── Helpers ──
    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function getCharPosAt(container, idx) {
      const spans = container.querySelectorAll('.char');
      const span = spans[idx] || spans[spans.length - 1];
      if (span) { const r = span.getBoundingClientRect(); return { x: r.left + r.width/2, y: r.top + r.height/2 }; }
      const r = container.getBoundingClientRect();
      return { x: r.left + 20, y: r.top + r.height/2 };
    }

    // ── Shake ──
    function shakeEl(el, cls) {
      el.classList.remove(cls); void el.offsetWidth;
      el.classList.add(cls);
      el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
    }
    function shakeScreen() { shakeEl(typingArea, 'screen-shake'); }
    function errorShake()  { shakeEl(typingArea, 'error-shake'); }

    // ── 選取與游標輔助函數 ──
    function getSelection() {
      const val = hiddenInput.value;
      const startIdx = [...val.slice(0, hiddenInput.selectionStart)].length;
      const endIdx   = [...val.slice(0, hiddenInput.selectionEnd)].length;
      return { start: startIdx, end: endIdx };
    }

    function setSelectionIndex(charIdx) {
      const val = hiddenInput.value;
      let byteIdx = 0;
      let count = 0;
      for (const char of val) {
        if (count >= charIdx) break;
        byteIdx += char.length;
        count++;
      }
      hiddenInput.selectionStart = byteIdx;
      hiddenInput.selectionEnd = byteIdx;
    }

    // ── Render TEST ──
    function renderTest(committed, composing) {
      const targetChars = [...currentTarget];
      const typedChars  = [...committed];
      const typedLen = typedChars.length;

      const sel = getSelection();
      const cursorPos = sel.start;

      let inputHtml = '';
      let cursorInserted = false;

      for (let i = 0; i < typedLen; i++) {
        if (i === cursorPos && sel.start === sel.end && !composing && !cursorInserted) {
          inputHtml += '<span class="cursor"></span>';
          cursorInserted = true;
        }
        const ok = targetChars[i] !== undefined && typedChars[i] === targetChars[i];
        const cls = ok ? 'correct' : 'wrong';
        const spawn = (i === typedLen - 1 && !composing) ? ' char-spawn' : '';
        inputHtml += '<span class="char ' + cls + spawn + '">' + esc(typedChars[i]) + '</span>';
      }
      if (composing) inputHtml += '<span class="composing">' + esc(composing) + '</span>';
      if (!cursorInserted && !composing) inputHtml += '<span class="cursor"></span>';
      testInputDisplay.innerHTML = inputHtml;

      let targetHtml = '';
      for (let i = 0; i < targetChars.length; i++) {
        let cls = 'target-pending';
        if (i < typedLen) {
          cls = (typedChars[i] === targetChars[i]) ? 'target-done' : 'target-error';
        } else if (i === typedLen) {
          cls = 'target-active';
        }
        targetHtml += '<span class="' + cls + '">' + esc(targetChars[i]) + '</span>';
      }
      targetDisplay.innerHTML = targetHtml;
    }

    function handleTestChange(committed, wasDelete) {
      ensureAudio();
      const targetChars = [...currentTarget];
      const typedChars  = [...committed];

      const sel = getSelection();

      if (wasDelete) {
        breakCombo(); errorShake(); sfxError();
        renderTest(committed, '');
        requestAnimationFrame(() => {
          const pos = sel.start > 0
            ? getCharPosAt(testInputDisplay, sel.start - 1)
            : { x: testInputDisplay.getBoundingClientRect().left + 20, y: testInputDisplay.getBoundingClientRect().top + 20 };
          spawnParticles(pos.x, pos.y, 12, errColor(), 100);
        });
        return;
      }

      const prevChars = [...prevText];
      const newCount  = typedChars.length - prevChars.length;
      const insStart  = sel.start - newCount;

      for (let i = 0; i < newCount; i++) {
        const idx = insStart + i;
        totalTyped++;
        if (targetChars[idx] !== undefined && typedChars[idx] === targetChars[idx]) {
          totalCorrect++; addCombo(); sfxCorrect();
        } else {
          breakCombo(); sfxWrong();
        }
      }

      renderTest(committed, '');
      requestAnimationFrame(() => {
        const lastIdx = insStart + newCount - 1;
        if (lastIdx < 0) return;
        const pos = getCharPosAt(testInputDisplay, lastIdx);
        const ok  = targetChars[lastIdx] !== undefined && typedChars[lastIdx] === targetChars[lastIdx];
        if (ok) {
          const tier = getTier();
          spawnParticles(pos.x, pos.y, 5 + Math.min(combo, 30), tierColor(tier));
          if (PUNCT.has(typedChars[lastIdx])) {
            shakeScreen();
            spawnParticles(pos.x, pos.y, 15, tierColor(tier), 120);
          }
        } else {
          spawnParticles(pos.x, pos.y, 8, errColor(), 60);
          errorShake();
        }
      });

      if (typedChars.length === targetChars.length) {
        const allCorrect = typedChars.every((c, i) => c === targetChars[i]);
        if (allCorrect) onSentenceComplete();
      }
    }

    function onSentenceComplete() {
      sfxComplete();
      completeMsg.classList.add('show');
      setTimeout(() => completeMsg.classList.remove('show'), 1500);
      const r = testInputDisplay.getBoundingClientRect();
      spawnParticles(r.left + r.width/2, r.top + r.height/2, 50, tierColor(getTier()), 150);
      setTimeout(() => {
        if (sentenceIdx < SENTENCES.length - 1) loadSentence(sentenceIdx + 1);
      }, 1200);
    }

    function updateNav() {
      sentenceCounter.textContent = (sentenceIdx + 1) + ' / ' + SENTENCES.length;
      btnPrev.style.visibility = sentenceIdx > 0 ? 'visible' : 'hidden';
      btnNext.style.visibility = sentenceIdx < SENTENCES.length - 1 ? 'visible' : 'hidden';
    }

    function loadSentence(idx) {
      sentenceIdx = idx;
      currentTarget = SENTENCES[idx];
      hiddenInput.value = '';
      prevText = '';
      composingText = '';
      lastCommittedValue = '';
      updateNav();
      renderTest('', '');
      hiddenInput.focus({ preventScroll: true });
    }

    btnPrev.addEventListener('click', (e) => {
      e.stopPropagation();
      if (sentenceIdx > 0) loadSentence(sentenceIdx - 1);
    });
    btnNext.addEventListener('click', (e) => {
      e.stopPropagation();
      if (sentenceIdx < SENTENCES.length - 1) loadSentence(sentenceIdx + 1);
    });

    function toHalfWidth(str) {
      if (!str) return '';
      return str
        .replace(/[\uFF01-\uFF5E]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0xfee0))
        .replace(/　/g, ' ')
        .replace(/。/g, '.')
        .replace(/、/g, ',');
    }

    // ── IME ──
    hiddenInput.addEventListener('compositionstart', () => {
      isComposing = true; composingText = '';
      lastCommittedValue = hiddenInput.value;
    });
    hiddenInput.addEventListener('compositionupdate', (e) => {
      composingText = e.data || '';
      const currentVal = hiddenInput.value;
      let committed = lastCommittedValue;

      const hCurrent = toHalfWidth(currentVal);
      const hLast = toHalfWidth(lastCommittedValue);
      const hComp = toHalfWidth(composingText);

      if (composingText && hCurrent.endsWith(hComp)) {
        committed = currentVal.slice(0, -composingText.length);
      } else if (composingText && hLast.endsWith(hComp)) {
        // 🌟 Slices off from lastCommittedValue if browser update lag occurs
        committed = lastCommittedValue.slice(0, -composingText.length);
      }
      renderTest(committed, composingText);
    });
    hiddenInput.addEventListener('compositionend', () => {
      isComposing = false; composingText = '';
      clearTimeout(processTimer);
      processTimer = setTimeout(processInput, 30);
    });
    hiddenInput.addEventListener('input', (e) => {
      if (isComposing || e.isComposing) return;
      clearTimeout(processTimer);
      processTimer = setTimeout(processInput, 30);
    });

    // 🌟 監聽實體刪除鍵以區分使用者手動刪除與 IME 的自動同步刪除
    hiddenInput.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' || e.key === 'Delete') {
        isDeleteKeyActive = true;
      }
      if (isComposing || e.key === 'Process') return;
      const targetLen  = [...currentTarget].length;
      const currentLen = [...hiddenInput.value].length;
      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && currentLen >= targetLen) {
        e.preventDefault();
      }
    });
    hiddenInput.addEventListener('select', () => {
      if (isComposing) return;
      renderTest(hiddenInput.value, composingText);
    });
    hiddenInput.addEventListener('keyup', (e) => {
      if (e.key === 'Backspace' || e.key === 'Delete') {
        isDeleteKeyActive = false;
      }
      if (isComposing) return;
      const nav = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End', 'Shift'];
      if (nav.includes(e.key) || e.shiftKey) {
        renderTest(hiddenInput.value, composingText);
      }
    });

    testInputDisplay.addEventListener('click', (e) => {
      e.stopPropagation();
      const charSpan = e.target.closest('.char');
      if (charSpan) {
        const spans = Array.from(testInputDisplay.querySelectorAll('.char'));
        const idx = spans.indexOf(charSpan);
        if (idx !== -1) {
          const rect = charSpan.getBoundingClientRect();
          const clickX = e.clientX - rect.left;
          const isBefore = clickX < rect.width / 2;
          const cursorIdx = isBefore ? idx : idx + 1;
          setSelectionIndex(cursorIdx);
        }
      } else {
        const typedLen = [...hiddenInput.value].length;
        setSelectionIndex(typedLen);
      }
      hiddenInput.focus({ preventScroll: true });
      renderTest(hiddenInput.value, isComposing ? composingText : '');
    });

    function processInput() {
      if (isComposing) return;
      const committed = hiddenInput.value;
      if (committed === prevText) { renderTest(committed, ''); return; }
      
      const wasDelete = [...committed].length < [...prevText].length;
      
      // 🌟 IME 刪除同步安全閥：若字數減少但實體刪除鍵沒有被按下，判定為 IME 自動刪除，進行還原
      if (wasDelete && !isDeleteKeyActive) {
        console.log('[IME DEBUG] 攔截到 IME 自動同步刪除，還原數值至:', prevText);
        hiddenInput.value = prevText;
        lastCommittedValue = prevText;
        renderTest(prevText, '');
        return;
      }

      handleTestChange(committed, wasDelete);
      prevText = committed;
      lastCommittedValue = committed;
    }

    // ── 焦點管理 ──
    document.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
      hiddenInput.focus({ preventScroll: true });
    });

    // iframe 內自動聚焦
    window.addEventListener('focus', () => {
      hiddenInput.focus({ preventScroll: true });
    });

    // ── 按鈕功能 ──
    btnCopy.addEventListener('click', (e) => {
      e.stopPropagation();
      const text = hiddenInput.value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        btnCopy.textContent = '✓';
        setTimeout(() => { btnCopy.textContent = 'COPY'; }, 1200);
      });
    });

    btnTheme.addEventListener('click', (e) => {
      e.stopPropagation();
      themeBW = !themeBW;
      document.body.classList.toggle('theme-bw', themeBW);
      btnTheme.classList.toggle('active', themeBW);
      hiddenInput.focus({ preventScroll: true });
    });

    btnMute.addEventListener('click', (e) => {
      e.stopPropagation();
      muted = !muted;
      btnMute.textContent = muted ? '🔇' : '🔊';
      if (muted && audioCtx) audioCtx.suspend();
      else if (!muted && audioCtx) audioCtx.resume();
    });

    // ── 初始化 ──
    loadSentence(0);
    updateHUD();
  </script>
</body>
</html>
